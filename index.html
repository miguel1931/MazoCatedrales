<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MazoCatedrales · Atlas Cristiano Mundial</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
      integrity="sha512-h9FcoyWjHcOcmEVkxOfTLnmZFWIH0iZhZT1H2TbOq55xssQGEJHEaIm+PgoUaZbRvQTNTluNOEfb1ZRy6D3BOw=="
      crossorigin="anonymous" referrerpolicy="no-referrer" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"
        integrity="sha512-BB3hKbKWOc9Ez/TAwyWxNXeoV9c1v6FIeYiBieIWkpLjauysF18NzgR1MBNBXf8/KABdlkX68nAhlwcDFLGPCQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" defer></script>
<script>
  // Fallback: si cdnjs falla, probar unpkg
  window.addEventListener('DOMContentLoaded', () => {
    if (typeof L === 'undefined') {
      console.warn('Leaflet no cargó desde cdnjs, intentando unpkg...');
      const css = document.createElement('link');
      css.rel = 'stylesheet';
      css.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
      document.head.appendChild(css);
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
      s.onload = () => window.__initMazo && window.__initMazo();
      s.onerror = () => {
        document.body.innerHTML = '<div style="padding:40px;font-family:monospace;color:#e8e3d5;background:#0f0e0c;height:100vh;">ERROR: No se pudo cargar Leaflet. Revisa tu conexión o bloqueadores de CDN (cdnjs.cloudflare.com, unpkg.com).</div>';
      };
      document.head.appendChild(s);
    }
  });
</script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --bg-panel: #1a1815;
    --bg-panel-alt: #22201c;
    --fg: #e8e3d5;
    --fg-dim: #a39b88;
    --fg-faded: #6b6557;
    --accent: #c9a227;       /* oro viejo */
    --accent-dim: #8a6f1a;
    --rust: #9b3a1f;         /* rojo óxido */
    --border: #2e2a24;
    --catolica: #c9a227;     /* oro */
    --ortodoxa: #9b3a1f;     /* rojo óxido */
    --anglicana: #4a6b8a;    /* azul piedra */
    --protestante: #5d7a4a;  /* verde musgo */
    --historica: #8a7b6b;    /* gris piedra */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg);
    color: var(--fg);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  /* Layout */
  .app { display: grid; grid-template-columns: 340px 1fr; height: 100vh; }

  /* Mobile toggle button */
  .mobile-toggle {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1100;
    background: var(--bg-panel);
    color: var(--accent);
    border: 1px solid var(--accent-dim);
    padding: 12px 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    transition: all 0.2s;
  }
  .mobile-toggle:hover, .mobile-toggle:active {
    background: var(--bg-panel-alt);
    border-color: var(--accent);
  }
  .mobile-toggle .toggle-icon { margin-right: 8px; }

  @media (max-width: 768px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      position: relative;
    }
    .mobile-toggle { display: block; }
    .sidebar {
      position: fixed;
      top: 0; left: 0; right: 0;
      bottom: 0;
      z-index: 1000;
      max-height: 100vh;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      border-right: none;
      border-top: 2px solid var(--accent-dim);
    }
    .sidebar.open {
      transform: translateY(0);
    }
    .sidebar .brand {
      padding: 14px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .sidebar .brand-sub,
    .sidebar .brand-meta { display: none; }
    .sidebar .brand-title { font-size: 20px; }
    .mobile-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--fg-dim);
      font-size: 20px;
      width: 36px; height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .mobile-close:hover { color: var(--accent); border-color: var(--accent); }
    .search-wrap { padding: 10px 16px; }
    .search-input { padding: 12px; font-size: 14px; }
    .filters { padding: 10px 16px; }
    .filters .filter-group {
      flex-direction: row;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filters .filter-chip {
      padding: 8px 10px;
      font-size: 11px;
      flex: 0 0 auto;
    }
    .filters .filter-chip .label { font-size: 11px; }
    .stats { padding: 8px 16px; font-size: 12px; }
    .list-item { padding: 12px 16px; }
    .list-item-name { font-size: 16px; }
    .list-item-meta { font-size: 11px; margin-top: 4px; }
    .foot { padding: 8px 16px; }
    .map-wrap { grid-row: 1; grid-column: 1; }
    .map-badge { display: none; }
    .leaflet-popup-content { min-width: 200px; max-width: 280px; }
    .popup-name { font-size: 16px; }
    .popup-inner { padding: 12px 14px; }
  }

  /* Hide close button on desktop */
  .mobile-close { display: none; }

  /* Sidebar */
  .sidebar {
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .brand {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--bg-panel-alt) 0%, var(--bg-panel) 100%);
  }
  .brand-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--fg);
    line-height: 1;
  }
  .brand-title .amp { color: var(--accent); font-style: italic; font-weight: 400; }
  .brand-sub {
    margin-top: 6px;
    font-size: 10px;
    color: var(--fg-faded);
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .brand-meta {
    margin-top: 10px;
    font-size: 10px;
    color: var(--accent-dim);
    font-family: 'IBM Plex Mono', monospace;
  }
  .brand-meta::before { content: "» "; color: var(--rust); }

  /* Search */
  .search-wrap { padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 9px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--fg-faded); }

  /* Filters */
  .filters { padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .filters-label {
    font-size: 9px;
    color: var(--fg-faded);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .filter-group { display: flex; flex-direction: column; gap: 6px; }
  .filter-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 12px;
    user-select: none;
  }
  .filter-chip:hover { border-color: var(--fg-dim); }
  .filter-chip.active { border-color: currentColor; background: var(--bg-panel-alt); }
  .filter-chip .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }
  .filter-chip .label { flex: 1; color: var(--fg); }
  .filter-chip .count { color: var(--fg-faded); font-size: 10px; }
  .filter-chip[data-denom="catolica"] { color: var(--catolica); }
  .filter-chip[data-denom="ortodoxa"] { color: var(--ortodoxa); }
  .filter-chip[data-denom="anglicana"] { color: var(--anglicana); }
  .filter-chip[data-denom="protestante"] { color: var(--protestante); }
  .filter-chip[data-denom="historica"] { color: var(--historica); }

  /* Stats */
  .stats {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--fg-dim);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .stats .num { color: var(--accent); font-weight: 500; font-size: 14px; }

  /* List */
  .list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  .list::-webkit-scrollbar { width: 6px; }
  .list::-webkit-scrollbar-track { background: var(--bg-panel); }
  .list::-webkit-scrollbar-thumb { background: var(--border); }
  .list::-webkit-scrollbar-thumb:hover { background: var(--fg-faded); }

  .list-item {
    padding: 10px 20px;
    border-left: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
  }
  .list-item:hover { background: var(--bg-panel-alt); border-left-color: var(--accent); }
  .list-item.active { background: var(--bg-panel-alt); border-left-color: var(--accent); }
  .list-item-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    color: var(--fg);
    font-weight: 600;
    line-height: 1.2;
  }
  .list-item-meta {
    font-size: 10px;
    color: var(--fg-faded);
    margin-top: 3px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .list-item-meta .denom-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }

  /* Footer */
  .foot {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    font-size: 9px;
    color: var(--fg-faded);
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
  }
  .foot .rust { color: var(--rust); }

  /* Map */
  .map-wrap { position: relative; }
  #map { height: 100%; width: 100%; background: #0a0908; }

  /* Dark Leaflet overrides */
  .leaflet-container {
    background: #0a0908;
    font-family: 'IBM Plex Mono', monospace;
  }
  .leaflet-control-zoom a {
    background: var(--bg-panel) !important;
    color: var(--fg) !important;
    border: 1px solid var(--border) !important;
  }
  .leaflet-control-zoom a:hover {
    background: var(--bg-panel-alt) !important;
    color: var(--accent) !important;
  }
  .leaflet-control-attribution {
    background: rgba(15, 14, 12, 0.85) !important;
    color: var(--fg-faded) !important;
    font-size: 9px !important;
    font-family: 'IBM Plex Mono', monospace !important;
  }
  .leaflet-control-attribution a { color: var(--fg-dim) !important; }

  /* Custom markers */
  .cathedral-marker {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px currentColor, 0 2px 6px rgba(0,0,0,0.5);
    transition: transform 0.15s;
  }
  .cathedral-marker:hover { transform: scale(1.4); }

  /* Popup */
  .leaflet-popup-content-wrapper {
    background: var(--bg-panel) !important;
    color: var(--fg) !important;
    border-radius: 2px !important;
    border: 1px solid var(--border) !important;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6) !important;
    padding: 0 !important;
  }
  .leaflet-popup-content {
    margin: 0 !important;
    font-family: 'IBM Plex Mono', monospace;
    min-width: 240px;
  }
  .leaflet-popup-tip { background: var(--bg-panel) !important; border: 1px solid var(--border) !important; }
  .leaflet-popup-close-button {
    color: var(--fg-faded) !important;
    font-size: 18px !important;
    padding: 6px 8px !important;
  }
  .leaflet-popup-close-button:hover { color: var(--accent) !important; }

  .popup-inner { padding: 14px 16px; }
  .popup-denom-bar { height: 3px; width: 100%; background: var(--accent); }
  .popup-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.15;
    color: var(--fg);
    margin-bottom: 2px;
  }
  .popup-loc {
    font-size: 10px;
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }
  .popup-meta {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 12px;
    font-size: 11px;
    margin-bottom: 10px;
  }
  .popup-meta dt { color: var(--fg-faded); text-transform: uppercase; letter-spacing: 1px; font-size: 9px; }
  .popup-meta dd { color: var(--fg); }
  .popup-note {
    font-size: 11px;
    color: var(--fg-dim);
    line-height: 1.45;
    font-style: italic;
    border-left: 2px solid var(--accent);
    padding-left: 8px;
    margin-top: 8px;
  }
  .popup-link {
    display: inline-block;
    margin-top: 10px;
    font-size: 10px;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--accent-dim);
    padding-bottom: 1px;
  }
  .popup-link:hover { color: var(--fg); border-color: var(--fg); }

  /* Legend overlay on map corner (desktop luxury) */
  .map-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 500;
    background: rgba(26, 24, 21, 0.9);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    padding: 10px 14px;
    font-size: 10px;
    color: var(--fg-faded);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .map-badge .rust-dot::before {
    content: "■";
    color: var(--rust);
    margin-right: 6px;
  }

  .no-results {
    padding: 24px 20px;
    text-align: center;
    color: var(--fg-faded);
    font-size: 11px;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div>
        <div class="brand-title">Mazo<span class="amp">&</span>Catedrales</div>
        <div class="brand-sub">Atlas Cristiano Mundial</div>
        <div class="brand-meta">forja nova · registro cartográfico</div>
      </div>
      <button class="mobile-close" id="sidebar-close" aria-label="Cerrar panel">&times;</button>
    </div>

    <div class="search-wrap">
      <input type="text" class="search-input" id="search" placeholder="buscar catedral, ciudad, país…">
    </div>

    <div class="filters">
      <div class="filters-label">Denominaciones</div>
      <div class="filter-group" id="filters"></div>
    </div>

    <div class="stats">
      <span><span class="num" id="visible-count">0</span> visibles</span>
      <span>de <span id="total-count">0</span> registradas</span>
    </div>

    <div class="list" id="list"></div>

    <div class="foot">
      <span>v0.1 · prototipo</span>
      <span class="rust">foc i ferro</span>
    </div>
  </aside>

  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-badge"><span class="rust-dot"></span>clic en marcador</div>
  </div>
  <button class="mobile-toggle" id="sidebar-toggle">
    <span class="toggle-icon">&#9776;</span> Explorar catedrales
  </button>
</div>

<script>

  if (typeof L === 'undefined') {
    console.error('Leaflet sigue sin estar disponible');
    return;
  }
// === DATASET ===
// Catedrales curadas, distribución global por denominación.
// Tipos: catolica, ortodoxa, anglicana, protestante, historica
const DATA = [

  {name:"Basílica del Buen Pastor", city:"Singapur", country:"Singapur", lat:1.2944, lng:103.8508, denom:"catolica", year:1847, note:"La iglesia católica más antigua de Singapur."},
  {name:"Catedral de San Andrés", city:"Singapur", country:"Singapur", lat:1.2928, lng:103.8514, denom:"anglicana", year:1862, note:"Neogótica colonial británica."},
  {name:"Catedral Armenia", city:"Calcuta", country:"India", lat:22.5728, lng:88.3556, denom:"ortodoxa", year:1724, note:"La iglesia cristiana más antigua de Calcuta."},
  {name:"Basílica del Buen Jesús", city:"Goa", country:"India", lat:15.5007, lng:73.9114, denom:"catolica", year:1605, note:"UNESCO. Cuerpo incorrupto de San Francisco Javier."},
  {name:"Catedral de San Jorge", city:"Chennai", country:"India", lat:13.0622, lng:80.2456, denom:"anglicana", year:1815, note:"Diócesis anglicana más antigua de la India."},

  // === OCEANÍA ===
  {name:"Catedral de Santa María", city:"Sídney", country:"Australia", lat:-33.8716, lng:151.2132, denom:"catolica", year:1928, note:"Neogótica. La iglesia más grande de Australia."},
  {name:"Catedral de San Patricio", city:"Melbourne", country:"Australia", lat:-37.8103, lng:144.9764, denom:"catolica", year:1939, note:"Neogótica en piedra arenisca."},
  {name:"Catedral Anglicana", city:"Wellington", country:"Nueva Zelanda", lat:-41.2776, lng:174.7810, denom:"anglicana", year:1998, note:"San Pablo. Arquitectura modernista."},
  {name:"Catedral de Christchurch", city:"Christchurch", country:"Nueva Zelanda", lat:-43.5308, lng:172.6358, denom:"anglicana", year:1904, note:"Dañada por el terremoto de 2011. En restauración."},

  // === CANADÁ ===
  {name:"Basílica de Notre-Dame", city:"Montreal", country:"Canadá", lat:45.5045, lng:-73.5564, denom:"catolica", year:1829, note:"Neogótica. Interior policromado espectacular."},
  {name:"Oratorio de San José", city:"Montreal", country:"Canadá", lat:45.4919, lng:-73.6175, denom:"catolica", year:1967, note:"La iglesia más alta de Canadá. Basílica menor."},
  {name:"Basílica-Catedral de Quebec", city:"Ciudad de Quebec", country:"Canadá", lat:46.8139, lng:-71.2058, denom:"catolica", year:1650, note:"La catedral católica más antigua al norte de México."},
  {name:"Iglesia Católica de Toronto", city:"Toronto", country:"Canadá", lat:43.6548, lng:-79.3761, denom:"catolica", year:1848, note:"Catedral de San Miguel. Neogótica."}
];

// === DENOMINACIONES ===
const DENOMS = {
  catolica:    { label: "Católica",    color: "#c9a227" },
  ortodoxa:    { label: "Ortodoxa",    color: "#9b3a1f" },
  anglicana:   { label: "Anglicana",   color: "#4a6b8a" },
  protestante: { label: "Protestante", color: "#5d7a4a" },
  historica:   { label: "Histórica",   color: "#8a7b6b" }
};

// === STATE ===
const state = {
  activeDenoms: new Set(Object.keys(DENOMS)),
  searchTerm: "",
  selectedId: null
};

// === MAP INIT ===
const map = L.map('map', {
  center: [30, 10],
  zoom: 2,
  minZoom: 2,
  maxZoom: 18,
  worldCopyJump: true,
  zoomControl: true
});

// Dark tile layer
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap · © CARTO · Forja Nova',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// === MARKERS ===
const markers = [];
DATA.forEach((d, idx) => {
  d._id = idx;
  const color = DENOMS[d.denom].color;
  const icon = L.divIcon({
    className: '',
    html: `<div class="cathedral-marker" style="background:${color};color:${color}"></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7]
  });
  const marker = L.marker([d.lat, d.lng], { icon });
  marker.bindPopup(buildPopup(d), { maxWidth: 320, closeButton: true });
  marker._data = d;
  markers.push(marker);
});

function buildPopup(d) {
  const denom = DENOMS[d.denom];
  return `
    <div class="popup-denom-bar" style="background:${denom.color}"></div>
    <div class="popup-inner">
      <div class="popup-name">${d.name}</div>
      <div class="popup-loc">${d.city} · ${d.country}</div>
      <dl class="popup-meta">
        <dt>Rito</dt><dd>${denom.label}</dd>
        ${d.year ? `<dt>Consagración</dt><dd>${d.year}</dd>` : ''}
      </dl>
      ${d.note ? `<div class="popup-note">${d.note}</div>` : ''}
      <a class="popup-link" href="https://www.google.com/maps/search/?api=1&query=${d.lat},${d.lng}" target="_blank" rel="noopener">→ ver en mapa</a>
    </div>
  `;
}

// === FILTERS UI ===
const filtersEl = document.getElementById('filters');
Object.entries(DENOMS).forEach(([key, info]) => {
  const count = DATA.filter(d => d.denom === key).length;
  const chip = document.createElement('div');
  chip.className = 'filter-chip active';
  chip.dataset.denom = key;
  chip.innerHTML = `
    <span class="dot"></span>
    <span class="label">${info.label}</span>
    <span class="count">${count}</span>
  `;
  chip.addEventListener('click', () => {
    if (state.activeDenoms.has(key)) state.activeDenoms.delete(key);
    else state.activeDenoms.add(key);
    chip.classList.toggle('active');
    render();
  });
  filtersEl.appendChild(chip);
});

// === SEARCH ===
document.getElementById('search').addEventListener('input', (e) => {
  state.searchTerm = e.target.value.trim().toLowerCase();
  render();
});

// === LIST ===
const listEl = document.getElementById('list');
const visibleCountEl = document.getElementById('visible-count');
const totalCountEl = document.getElementById('total-count');
totalCountEl.textContent = DATA.length;

function filteredData() {
  return DATA.filter(d => {
    if (!state.activeDenoms.has(d.denom)) return false;
    if (state.searchTerm) {
      const hay = `${d.name} ${d.city} ${d.country}`.toLowerCase();
      if (!hay.includes(state.searchTerm)) return false;
    }
    return true;
  });
}

function render() {
  const visible = filteredData();
  visibleCountEl.textContent = visible.length;

  // Markers
  markers.forEach(m => {
    const shouldShow = visible.some(v => v._id === m._data._id);
    if (shouldShow && !map.hasLayer(m)) m.addTo(map);
    else if (!shouldShow && map.hasLayer(m)) map.removeLayer(m);
  });

  // List
  listEl.innerHTML = '';
  if (visible.length === 0) {
    listEl.innerHTML = '<div class="no-results">sin resultados</div>';
    return;
  }
  const sorted = [...visible].sort((a,b) => a.name.localeCompare(b.name, 'es'));
  sorted.forEach(d => {
    const denom = DENOMS[d.denom];
    const item = document.createElement('div');
    item.className = 'list-item';
    if (state.selectedId === d._id) item.classList.add('active');
    item.innerHTML = `
      <div class="list-item-name">${d.name}</div>
      <div class="list-item-meta">
        <span class="denom-dot" style="background:${denom.color}"></span>
        <span>${d.city} · ${d.country}</span>
      </div>
    `;
    item.addEventListener('click', () => {
      state.selectedId = d._id;
      const marker = markers.find(m => m._data._id === d._id);
      if (marker) {
        map.flyTo([d.lat, d.lng], 10, { duration: 0.9 });
        setTimeout(() => marker.openPopup(), 950);
      }
      render();
    });
    listEl.appendChild(item);
  });
}

render();

// === MOBILE SIDEBAR TOGGLE ===
const sidebar = document.getElementById('sidebar');
const sidebarToggle = document.getElementById('sidebar-toggle');
const sidebarClose = document.getElementById('sidebar-close');

sidebarToggle.addEventListener('click', () => {
  sidebar.classList.add('open');
  sidebarToggle.style.display = 'none';
});
sidebarClose.addEventListener('click', () => {
  sidebar.classList.remove('open');
  sidebarToggle.style.display = '';
});
// Close sidebar when clicking a list item on mobile
listEl.addEventListener('click', (e) => {
  if (e.target.closest('.list-item') && window.innerWidth <= 768) {
    sidebar.classList.remove('open');
    sidebarToggle.style.display = '';
  }
});
}; // end __initMazo

// Auto-init cuando Leaflet esté disponible (carga normal desde cdnjs)
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof L !== 'undefined') window.__initMazo();
  });
} else {
  if (typeof L !== 'undefined') window.__initMazo();
}
</script>
</body>
</html>
